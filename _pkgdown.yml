url: https://Jonnboi13.github.io/regexpert/
template:
  bootstrap: 5

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]

reference:
  - title: "Builders"
    desc: "Functions for describing patterns in plain English."
    contents:
      - xp_build_digits
      - xp_build_letters
      - xp_build_whitespace
      - xp_build_alnum
      - xp_build_any
  - title: "Operators"
    desc: "Functions for modifying and combining patterns."
    contents:
      - xp_op_either
      - xp_op_optional
      - xp_op_repeat
      - xp_literal
  - title: "Wrappers"
    desc: "Functions for anchoring patterns."
    contents:
      - xp_wrap_boundary
      - xp_wrap_start
      - xp_wrap_end
  - title: "Actions"
    desc: "Functions for executing patterns on text."
    contents:
      - xp_find
      - xp_view